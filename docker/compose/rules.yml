# E2E Test Environment for SemStreams Rule Processor (Tier 0)
#
# This compose file is designed for Tier 0 rules-only E2E testing.
# NO external ML dependencies (semembed, seminstruct) - deterministic behavior.
#
# Uses tier0-rules-iot.json config which includes:
#   - Rule processor with stateful rules (OnEnter/OnExit actions)
#   - Graph processor with embedding/clustering DISABLED
#   - IoT sensor data processing
#
# Tier 0 demonstrates:
#   - Stateful rules with add_triple/remove_triple actions
#   - Dynamic graph behavior (relationships created/removed on state transitions)
#   - Hotpath-only processing (low latency, deterministic)
#   - PathRAG on explicit edges
#
# Use with task commands:
#   - task e2e:tier0       - Run Tier 0 rules-only test
#   - task e2e:rules-graph - Run rule → graph integration test (legacy)
#   - task e2e:clean       - Clean up test environment
#
services:
  # NATS Server with JetStream
  nats:
    image: nats:2.12.3-alpine
    container_name: semstreams-rules-nats
    ports:
      - "4222:4222" # Client connections
      - "8222:8222" # HTTP monitoring
    command:
      ["-js", "-sd", "/data", "-m", "8222", "--name", "semstreams-rules-nats"]
    volumes:
      - nats-semstreams-rules-data:/data
    networks:
      - semstreams-rules-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8222/healthz",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  # SemStreams Application (kitchen-sink config with rules)
  semstreams:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: production
    container_name: semstreams-rules-app
    command: ["--config", "/app/configs/tier0-rules-iot.json"]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - SEMSTREAMS_NATS_URLS=nats://nats:4222
      - SEMSTREAMS_LOG_LEVEL=debug
      # Embedding disabled (no semembed service)
      - EMBEDDING_PROVIDER=none
    volumes:
      - ../../configs:/app/configs:ro
      - ../../testdata:/data/testdata:ro
    ports:
      - "8080:8080" # HTTP API (health, components)
      - "8082:8082" # GraphQL gateway
      - "9090:9090" # Prometheus metrics
      - "14550:14550/udp" # UDP input
    networks:
      - semstreams-rules-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/readyz",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  semstreams-rules-net:
    driver: bridge

volumes:
  nats-semstreams-rules-data:
    driver: local
