# E2E Test Environment for SemStreams Tiered Testing
#
# ⚠️  THIS FILE IS FOR TIERED E2E TESTING ONLY - DO NOT USE DIRECTLY ⚠️
#
# This compose file is designed to work with task commands:
#   - task e2e:structural   - Rules + graph traversal (no ML)
#   - task e2e:statistical  - BM25 + community detection (no ML)
#   - task e2e:semantic     - Neural embeddings + LLM (requires ML services)
#   - task e2e:clean        - Clean up test environment
#
# Profiles:
#   - structural: NATS + semstreams (rules-only, no ML dependencies)
#   - statistical: NATS + semstreams (BM25 fallback, no ML dependencies)
#   - semantic: NATS + semembed + seminstruct + shimmy + semstreams-ml (full ML)
#
# Usage:
#   docker compose -f docker/compose/tiered.yml --profile structural up -d
#   docker compose -f docker/compose/tiered.yml --profile statistical up -d
#   docker compose -f docker/compose/tiered.yml --profile semantic up -d
#
# NOTE: statistical and semantic profiles are mutually exclusive - don't use both
#       as they share the same NATS KV buckets and will overwrite each other's data
#
# Running this directly will start services but NOT run tests.
# The E2E tests are executed from the host via cmd/e2e/e2e binary.
#
# Following Observer Pattern: E2E tests are external observers of the running system
services:
  # SemEmbed - Lightweight embedding service using fastembed-rs
  # For semantic search testing with OpenAI-compatible API
  # PROFILE: semantic - Only started when --profile semantic is specified
  semembed:
    image: ghcr.io/c360studio/semembed:latest
    container_name: semstreams-tiered-semembed
    profiles:
      - semantic
    ports:
      - "8081:8081" # OpenAI-compatible /v1/embeddings endpoint
    environment:
      - SEMEMBED_MODEL=BAAI/bge-small-en-v1.5
      - SEMEMBED_PORT=8081
      - RUST_LOG=info
    volumes:
      - semembed-tiered-cache:/home/semembed/.cache/fastembed
    networks:
      - semstreams-tiered-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Shimmy - Inference backend (model loading, heavy compute)
  # Downloads and runs Mistral-7B-Instruct for LLM inference
  # PROFILE: semantic - Only started when --profile semantic is specified
  shimmy:
    image: ghcr.io/c360studio/semshimmy:latest
    container_name: semstreams-tiered-shimmy
    profiles:
      - semantic
    environment:
      - RUST_LOG=info
    volumes:
      - shimmy-tiered-cache:/root/.cache/huggingface
    networks:
      - semstreams-tiered-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11435/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s # Model download takes time (~4GB first run)

  # SemInstruct - OpenAI-compatible proxy to shimmy
  # Lightweight proxy with retry logic and metrics
  # PROFILE: semantic - Only started when --profile semantic is specified
  seminstruct:
    image: ghcr.io/c360studio/seminstruct:latest
    container_name: semstreams-tiered-seminstruct
    profiles:
      - semantic
    ports:
      - "8084:8083" # OpenAI-compatible /v1/chat/completions
    environment:
      - SEMINSTRUCT_SHIMMY_URL=http://shimmy:11435
      - SEMINSTRUCT_PORT=8083
      - RUST_LOG=info
    depends_on:
      shimmy:
        condition: service_healthy
    networks:
      - semstreams-tiered-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # NATS Server with JetStream
  nats:
    image: nats:2.12.3-alpine
    container_name: semstreams-tiered-nats
    ports:
      - "4222:4222" # Client connections
      - "8222:8222" # HTTP monitoring
    command:
      ["-js", "-sd", "/data", "-m", "8222", "--name", "semstreams-tiered-nats"]
    volumes:
      - nats-semstreams-tiered-data:/data
    networks:
      - semstreams-tiered-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8222/healthz",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  # SemStreams Application (statistical tier config)
  # Statistical variant - runs without ML services (uses BM25 fallback for search)
  # PROFILE: statistical - Only started when --profile statistical is specified
  semstreams:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: production
    container_name: semstreams-tiered-app
    profiles:
      - statistical
    command: ["--config", "/app/configs/statistical.json"]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - SEMSTREAMS_NATS_URLS=nats://nats:4222
      - SEMSTREAMS_LOG_LEVEL=debug
      # Embedding disabled by default - BM25 fallback will be used
      - EMBEDDING_PROVIDER=none
    volumes:
      - ../../configs:/app/configs:ro
      - ../../testdata:/data/testdata:ro
    ports:
      - "8080:8080" # HTTP API (health, components)
      - "8082:8084" # GraphQL gateway (host:8082 -> container:8084)
      - "9090:9090" # Prometheus metrics
      - "14550:14550/udp" # UDP input
      - "8083:8082" # WebSocket output (host:8083 -> container:8082)
    networks:
      - semstreams-tiered-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/readyz",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  # SemStreams Application (structural tier config)
  # Structural variant - rules-only, no embeddings or clustering
  # PROFILE: structural - Only started when --profile structural is specified
  semstreams-structural:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: production
    container_name: semstreams-tiered-app-structural
    profiles:
      - structural
    command: ["--config", "/app/configs/structural.json"]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - SEMSTREAMS_NATS_URLS=nats://nats:4222
      - SEMSTREAMS_LOG_LEVEL=debug
      - EMBEDDING_PROVIDER=none
    volumes:
      - ../../configs:/app/configs:ro
      - ../../testdata:/data/testdata:ro
    ports:
      - "8080:8080" # HTTP API (health, components)
      - "8082:8082" # GraphQL gateway
      - "9090:9090" # Prometheus metrics
      - "14550:14550/udp" # UDP input
    networks:
      - semstreams-tiered-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/readyz",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  # SemStreams Application with ML services enabled
  # PROFILE: semantic - Only started when --profile semantic is specified
  semstreams-ml:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: production
    container_name: semstreams-tiered-app-ml
    profiles:
      - semantic
    entrypoint: ["sh", "-c"]
    command: ["sleep 30 && /app/semstreams --config /app/configs/semantic.json"]
    depends_on:
      nats:
        condition: service_healthy
      semembed:
        condition: service_healthy
      seminstruct:
        condition: service_healthy
    environment:
      - SEMSTREAMS_NATS_URLS=nats://nats:4222
      - SEMSTREAMS_LOG_LEVEL=debug
    volumes:
      - ../../configs:/app/configs:ro
      - ../../testdata:/data/testdata:ro
    ports:
      - "8180:8080" # HTTP API (different port to avoid conflict with core)
      - "8182:8084" # GraphQL gateway (host:8182 -> container:8084)
      - "9190:9090" # Prometheus metrics
      - "14650:14550/udp" # UDP input
      - "8183:8082" # WebSocket output
    networks:
      - semstreams-tiered-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/readyz",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  semstreams-tiered-net:
    driver: bridge

volumes:
  nats-semstreams-tiered-data:
    driver: local
  semembed-tiered-cache:
    driver: local
  shimmy-tiered-cache:
    driver: local
