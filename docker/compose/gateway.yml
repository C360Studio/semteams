# E2E Test Environment for SemStreams Gateway Testing (GraphQL + MCP)
#
# This compose file is designed for gateway E2E testing.
# Tests GraphQL and MCP gateway endpoints with pre-populated data.
#
# Use with task commands:
#   - task e2e:gateway:graphql - Run GraphQL gateway tests
#   - task e2e:gateway:mcp     - Run MCP gateway tests
#   - task e2e:gateway:all     - Run all gateway tests
#   - task e2e:clean           - Clean up test environment
#
services:
  # NATS Server with JetStream
  nats:
    image: nats:2.12.3-alpine
    container_name: semstreams-gateway-nats
    ports:
      - "4222:4222" # Client connections
      - "8222:8222" # HTTP monitoring
    command:
      ["-js", "-sd", "/data", "-m", "8222", "--name", "semstreams-gateway-nats"]
    volumes:
      - nats-semstreams-gateway-data:/data
    networks:
      - semstreams-gateway-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8222/healthz",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  # SemStreams Application with GraphQL and MCP gateways enabled
  semstreams:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: production
    container_name: semstreams-gateway-app
    command: ["--config", "/app/configs/gateway-test.json"]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - SEMSTREAMS_NATS_URLS=nats://nats:4222
      - SEMSTREAMS_LOG_LEVEL=debug
      # Enable both gateways
      - SEMSTREAMS_GRAPHQL_ENABLED=true
      - SEMSTREAMS_MCP_ENABLED=true
    volumes:
      - ../../configs:/app/configs:ro
      - ../../testdata:/data/testdata:ro
    ports:
      - "8080:8080" # HTTP API (health, components, GraphQL)
      - "8081:8081" # MCP gateway (SSE)
      - "9090:9090" # Prometheus metrics
      - "14550:14550/udp" # UDP input
    networks:
      - semstreams-gateway-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  semstreams-gateway-net:
    driver: bridge

volumes:
  nats-semstreams-gateway-data:
    driver: local
