name: Container Build

on:
  # Trigger after CI workflow completes on main branch
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Direct trigger for version tags (CI should pass before tagging)
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: c360studio/semteams

jobs:
  build:
    name: Build Container
    runs-on: ubuntu-latest
    # Only run if CI succeeded (for workflow_run) or if triggered by tag
    if: >
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use the commit from the triggering workflow for workflow_run events
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag as 'latest' for main branch (workflow_run)
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_run' }}
            # Tag with git tag (v1.2.3)
            type=semver,pattern={{version}}
            # Tag with major.minor (v1.2)
            type=semver,pattern={{major}}.{{minor}}
            # Tag with major (v1)
            type=semver,pattern={{major}}
            # Tag with branch name and SHA for main branch
            type=raw,value=main-${{ github.event.workflow_run.head_sha || github.sha }},enable=${{ github.event_name == 'workflow_run' }}
          labels: |
            org.opencontainers.image.title=SemTeams
            org.opencontainers.image.description=Agentic coordination platform
            org.opencontainers.image.vendor=C360
            org.opencontainers.image.licenses=MIT

      - name: Build and push container
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_type == 'tag' && github.ref_name || github.event.workflow_run.head_sha || github.sha }}
            COMMIT_SHA=${{ github.event.workflow_run.head_sha || github.sha }}
            BUILD_DATE=${{ github.event.workflow_run.created_at || github.event.head_commit.timestamp }}

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.build.outputs.digest }}"

  # Report skipped status when CI failed
  report-skipped:
    name: Report CI Failed
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion != 'success'
    steps:
      - name: Report CI failure
        run: |
          echo "Container build skipped because CI workflow failed."
          echo "CI workflow conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "See CI workflow run: ${{ github.event.workflow_run.html_url }}"
