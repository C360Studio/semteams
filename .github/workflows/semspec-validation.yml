name: Semspec E2E Validation

on:
  workflow_dispatch:
    inputs:
      semspec_ref:
        description: 'Semspec branch/tag to test against'
        required: false
        default: 'main'

env:
  GO_VERSION: "1.25"

jobs:
  semspec-e2e:
    name: Semspec E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout semstreams
        uses: actions/checkout@v4
        with:
          path: semstreams

      - name: Checkout semspec
        uses: actions/checkout@v4
        with:
          repository: C360Studio/semspec
          path: semspec
          ref: ${{ inputs.semspec_ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            semstreams/go.sum
            semspec/go.sum

      - name: Install task
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - name: Use local semstreams
        run: |
          cd semspec
          go mod edit -replace github.com/c360studio/semstreams=../semstreams
          go mod tidy

      - name: Pull NATS image
        run: docker pull nats:latest

      - name: Run semspec e2e tests
        run: |
          cd semspec
          task e2e:full
