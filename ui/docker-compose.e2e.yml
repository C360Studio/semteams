# E2E Test Environment for SemTeams UI
#
# Starts NATS + semteams backend + UI + Caddy reverse proxy for Playwright
# E2E tests. The Playwright harness starts this stack automatically via
# playwright.config.ts's webServer directive.
#
# Usage:
#   docker compose -f docker-compose.e2e.yml up --build
#   # or let Playwright manage it:
#   npm run test:e2e
#
# Playwright tests run from the host and connect to http://localhost:3000

services:
  # NATS Server with JetStream
  nats:
    image: nats:2.10-alpine
    container_name: semteams-ui-e2e-nats
    command: ["-js", "-sd", "/data", "-m", "8222", "--name", "ui-e2e-nats"]
    volumes:
      - nats-e2e-data:/data
    networks:
      - e2e-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8222/healthz",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  # SemTeams backend (built from the semteams repo root at ../..)
  backend:
    build:
      context: ${BACKEND_CONTEXT:-../..}
      dockerfile: ${BACKEND_DOCKERFILE:-docker/Dockerfile}
      target: production
    container_name: semteams-ui-e2e-backend
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - STREAMKIT_NATS_URLS=nats://nats:4222
      - STREAMKIT_LOG_LEVEL=debug
    volumes:
      - ${BACKEND_CONTEXT:-../..}/configs/${BACKEND_CONFIG:-protocol-flow.json}:/etc/semstreams/config.json:ro
      - ${BACKEND_CONTEXT:-../..}/testdata:/data/testdata:ro
    networks:
      - e2e-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  # SemTeams UI
  ui:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: semteams-ui-e2e-ui
    environment:
      - NODE_ENV=development
      - BACKEND_HOST=backend:8080
    volumes:
      - ./src:/app/src
      - ./static:/app/static
      - ui-e2e-node-modules:/app/node_modules
    networks:
      - e2e-net

  # Caddy Reverse Proxy
  caddy:
    image: caddy:2-alpine
    container_name: semteams-ui-e2e-caddy
    depends_on:
      - ui
    volumes:
      - ./Caddyfile.e2e:/etc/caddy/Caddyfile:ro
    environment:
      - BACKEND_HOST=backend:8080
      - GRAPHQL_HOST=backend:8082
    ports:
      - "${E2E_UI_PORT:-3000}:3000"
    networks:
      - e2e-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  e2e-net:
    driver: bridge

volumes:
  nats-e2e-data:
    driver: local
  ui-e2e-node-modules:
    driver: local
