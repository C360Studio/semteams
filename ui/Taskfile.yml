version: "3"

vars:
  # Backend configuration — the semteams backend
  BACKEND_URL: '{{.BACKEND_URL | default "http://localhost:8080"}}'

  # OpenAPI spec path — defaults to the semteams-generated spec at the repo root
  OPENAPI_SPEC_PATH: '{{.OPENAPI_SPEC_PATH | default "../specs/openapi.v3.yaml"}}'

  # Development ports (configurable to avoid collisions)
  DEV_UI_PORT: '{{.DEV_UI_PORT | default "3001"}}'
  DEV_VITE_PORT: '{{.DEV_VITE_PORT | default "5173"}}'

tasks:
  # === Type Generation ===

  generate-types:
    desc: Generate TypeScript types from the semteams OpenAPI spec
    cmds:
      - npx openapi-typescript {{.OPENAPI_SPEC_PATH}} --output src/lib/types/api.generated.ts
      - echo "✅ TypeScript types generated from {{.OPENAPI_SPEC_PATH}}"

  generate-types:from-url:
    desc: Generate TypeScript types from running backend
    cmds:
      - npx openapi-typescript {{.BACKEND_URL}}/openapi.yaml --output src/lib/types/api.generated.ts
      - echo "✅ TypeScript types generated from {{.BACKEND_URL}}/openapi.yaml"

  generate-types:check:
    desc: Check for uncommitted type changes (CI)
    cmds:
      - task: generate-types
      - git diff --exit-code src/lib/types/api.generated.ts || (echo "⚠️  Generated types changed! Run 'task generate-types' and commit."; exit 1)

  # === Development ===

  dev:
    desc: Start Vite dev server only (no proxy — use dev:connect or dev:full instead)
    cmds:
      - echo "Starting UI dev server..."
      - echo "Expecting backend at {{.BACKEND_URL}}"
      - npm run dev

  dev:connect:
    desc: Connect to any running SemStreams app (no Docker backend needed)
    summary: |
      Starts Caddy + Vite dev server, proxying API requests to a running
      SemStreams backend. No NATS, no Docker build — just point and go.

      Examples:
        task dev:connect                                  # localhost:8080
        BACKEND_HOST=myapp.local:8080 task dev:connect    # remote host
        BACKEND_HOST=10.0.1.5:8080 GRAPHQL_HOST=10.0.1.5:8082 task dev:connect
    vars:
      BACKEND_HOST: '{{.BACKEND_HOST | default "localhost:8080"}}'
      GRAPHQL_HOST: '{{.GRAPHQL_HOST | default .BACKEND_HOST | default "localhost:8080"}}'
    env:
      BACKEND_HOST: "{{.BACKEND_HOST}}"
      GRAPHQL_HOST: "{{.GRAPHQL_HOST}}"
      UI_HOST: "localhost:{{.DEV_VITE_PORT}}"
      LISTEN_PORT: "{{.DEV_UI_PORT}}"
    deps:
      - task: dev:connect:check
        vars:
          BACKEND_HOST: "{{.BACKEND_HOST}}"
    cmds:
      - defer: { task: dev:connect:stop }
      - |
        echo "Connecting to SemStreams backend at {{.BACKEND_HOST}}"
        echo "GraphQL gateway at {{.GRAPHQL_HOST}}"
        echo ""
        echo "UI will be at http://localhost:{{.DEV_UI_PORT}}"
        echo ""
      - caddy start --config Caddyfile.dev
      - npm run dev -- --port {{.DEV_VITE_PORT}} --host
    preconditions:
      - sh: command -v caddy
        msg: "Caddy not found. Install with: brew install caddy"

  dev:connect:check:
    desc: Check if the backend is reachable
    internal: true
    vars:
      BACKEND_HOST: '{{.BACKEND_HOST | default "localhost:8080"}}'
    cmds:
      - |
        if curl -sf "http://{{.BACKEND_HOST}}/health" > /dev/null 2>&1; then
          echo "✅ Backend reachable at {{.BACKEND_HOST}}"
        else
          echo "⚠️  Backend at {{.BACKEND_HOST}} not responding — Caddy will retry"
        fi

  dev:connect:stop:
    desc: Stop the Caddy dev proxy
    internal: true
    cmds:
      - caddy stop 2>/dev/null || true

  # === Full Stack Development ===

  dev:backend:
    desc: Start backend infrastructure (NATS + backend) in foreground
    cmds:
      - echo "Starting backend infrastructure..."
      - echo "NATS will be at localhost:4222"
      - echo "Backend API will be at localhost:8080"
      - docker compose -f docker-compose.dev.yml up

  dev:backend:start:
    desc: Start backend infrastructure in background
    env:
      DEV_UI_PORT: "{{.DEV_UI_PORT}}"
      DEV_VITE_PORT: "{{.DEV_VITE_PORT}}"
    cmds:
      - docker compose -f docker-compose.dev.yml up -d
      - echo "✅ Backend infrastructure starting..."
      - echo "   Access UI at http://localhost:{{.DEV_UI_PORT}}"
      - echo "   Run 'task dev:backend:logs' to see logs"
      - echo "   Run 'task dev:backend:stop' to stop"

  dev:backend:stop:
    desc: Stop backend infrastructure
    cmds:
      - docker compose -f docker-compose.dev.yml down
      - echo "✅ Backend infrastructure stopped"

  dev:backend:logs:
    desc: View backend infrastructure logs
    cmds:
      - docker compose -f docker-compose.dev.yml logs -f

  dev:full:
    desc: Start full development stack (backend + frontend)
    env:
      DEV_UI_PORT: "{{.DEV_UI_PORT}}"
      DEV_VITE_PORT: "{{.DEV_VITE_PORT}}"
    cmds:
      - task: dev:backend:start
      - echo "Waiting for Caddy health check..."
      - |
        for i in $(seq 1 30); do
          if curl -s http://localhost:{{.DEV_UI_PORT}}/health > /dev/null 2>&1; then
            echo "✅ Backend ready!"
            break
          fi
          echo "   Waiting... ($i/30)"
          sleep 2
        done
      - echo ""
      - echo "📱 Open http://localhost:{{.DEV_UI_PORT}} in your browser"
      - echo ""
      - npm run dev -- --port {{.DEV_VITE_PORT}} --host

  dev:docker:
    desc: Start UI in Docker (backend at host.docker.internal:8080)
    cmds:
      - echo "Starting UI in Docker..."
      - docker compose up

  dev:with-caddy:
    desc: Start UI + Caddy in Docker (available at http://localhost:3000)
    cmds:
      - echo "Starting UI + Caddy..."
      - docker compose --profile caddy up

  # === Testing ===

  test:
    desc: Run unit tests
    cmds:
      - npm run test

  test:e2e:
    desc: Run E2E tests (auto-manages Docker stack)
    cmds:
      - npm run test:e2e

  test:e2e:agentic:
    desc: Run agentic journey E2E tests (separate stack with mock-llm + agentic.json backend)
    summary: |
      Runs Playwright tests under e2e/agentic/ against the agentic stack
      defined in docker-compose.agentic-e2e.yml. Each spec specifies the
      mock-llm fixture it expects via the FIXTURE env var.

      The agentic stack uses host port 3100 (configurable via
      E2E_AGENTIC_UI_PORT) so it can run alongside the default e2e stack
      on 3000.

      Pass FIXTURE to load a specific mock-llm script:
        FIXTURE=tool-approval-gate.yaml task test:e2e:agentic
    cmds:
      - npm run test:e2e:agentic

  test:e2e:agentic:tool-approval-gate:
    desc: Run the tool-approval-gate journey with its paired fixture
    cmds:
      - FIXTURE=tool-approval-gate.yaml npx playwright test --config playwright.agentic.config.ts e2e/agentic/tool-approval-gate.spec.ts

  test:e2e:agentic:real-time-activity-stream:
    desc: Run the real-time-activity-stream journey with its paired fixture
    cmds:
      - FIXTURE=real-time-activity-stream.yaml npx playwright test --config playwright.agentic.config.ts e2e/agentic/real-time-activity-stream.spec.ts

  test:e2e:agentic:cleanup:
    desc: Tear down the agentic E2E Docker stack
    cmds:
      - npm run test:e2e:agentic:cleanup

  test:all:
    desc: Run all tests
    cmds:
      - npm run test:all

  # === Linting and Formatting ===

  lint:
    desc: Run ESLint
    cmds:
      - npm run lint

  format:
    desc: Format code with Prettier
    cmds:
      - npm run format

  check:
    desc: Run type checking
    cmds:
      - npm run check

  # === CI ===

  ci:
    desc: Run all CI checks
    cmds:
      - task: lint
      - task: check
      - task: test
      - task: generate-types:check

  # === Cleanup ===

  clean:
    desc: Clean Docker volumes and containers
    cmds:
      - docker compose -f docker-compose.yml down -v
      - docker compose -f docker-compose.e2e.yml down -v
      - echo "✅ Cleaned up Docker resources"
