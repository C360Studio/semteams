version: "3"

env:
  # Pin the docker-compose project name so we don't collide with sibling
  # products (semspec, semdragons) whose compose files live in directories
  # also named `ui` and would otherwise share the default project name.
  # Without this, our `nats` service can be shadowed by another project's
  # nats container running concurrently.
  COMPOSE_PROJECT_NAME: '{{.COMPOSE_PROJECT_NAME | default "semteams-agentic"}}'

vars:
  # Backend configuration — the semteams backend
  BACKEND_URL: '{{.BACKEND_URL | default "http://localhost:8080"}}'

  # OpenAPI spec path — defaults to the semteams-generated spec at the repo root
  OPENAPI_SPEC_PATH: '{{.OPENAPI_SPEC_PATH | default "../specs/openapi.v3.yaml"}}'

  # Development ports (configurable to avoid collisions)
  DEV_UI_PORT: '{{.DEV_UI_PORT | default "3001"}}'
  DEV_VITE_PORT: '{{.DEV_VITE_PORT | default "5173"}}'

tasks:
  # === Type Generation ===

  generate-types:
    desc: Generate TypeScript types from the semteams OpenAPI spec
    cmds:
      - npx openapi-typescript {{.OPENAPI_SPEC_PATH}} --output src/lib/types/api.generated.ts
      - echo "✅ TypeScript types generated from {{.OPENAPI_SPEC_PATH}}"

  generate-types:from-url:
    desc: Generate TypeScript types from running backend
    cmds:
      - npx openapi-typescript {{.BACKEND_URL}}/openapi.yaml --output src/lib/types/api.generated.ts
      - echo "✅ TypeScript types generated from {{.BACKEND_URL}}/openapi.yaml"

  generate-types:check:
    desc: Check for uncommitted type changes (CI)
    cmds:
      - task: generate-types
      - git diff --exit-code src/lib/types/api.generated.ts || (echo "⚠️  Generated types changed! Run 'task generate-types' and commit."; exit 1)

  # === Development ===

  dev:
    desc: Start Vite dev server only (no proxy — use dev:connect or dev:full instead)
    cmds:
      - echo "Starting UI dev server..."
      - echo "Expecting backend at {{.BACKEND_URL}}"
      - npm run dev

  dev:connect:
    desc: Connect to any running SemStreams app (no Docker backend needed)
    summary: |
      Starts Caddy + Vite dev server, proxying API requests to a running
      SemStreams backend. No NATS, no Docker build — just point and go.

      Examples:
        task dev:connect                                  # localhost:8080
        BACKEND_HOST=myapp.local:8080 task dev:connect    # remote host
        BACKEND_HOST=10.0.1.5:8080 GRAPHQL_HOST=10.0.1.5:8082 task dev:connect
    vars:
      BACKEND_HOST: '{{.BACKEND_HOST | default "localhost:8080"}}'
      GRAPHQL_HOST: '{{.GRAPHQL_HOST | default .BACKEND_HOST | default "localhost:8080"}}'
    env:
      BACKEND_HOST: "{{.BACKEND_HOST}}"
      GRAPHQL_HOST: "{{.GRAPHQL_HOST}}"
      UI_HOST: "localhost:{{.DEV_VITE_PORT}}"
      LISTEN_PORT: "{{.DEV_UI_PORT}}"
    deps:
      - task: dev:connect:check
        vars:
          BACKEND_HOST: "{{.BACKEND_HOST}}"
    cmds:
      - defer: { task: dev:connect:stop }
      - |
        echo "Connecting to SemStreams backend at {{.BACKEND_HOST}}"
        echo "GraphQL gateway at {{.GRAPHQL_HOST}}"
        echo ""
        echo "UI will be at http://localhost:{{.DEV_UI_PORT}}"
        echo ""
      - caddy start --config Caddyfile.dev
      - npm run dev -- --port {{.DEV_VITE_PORT}} --host
    preconditions:
      - sh: command -v caddy
        msg: "Caddy not found. Install with: brew install caddy"

  dev:connect:check:
    desc: Check if the backend is reachable
    internal: true
    vars:
      BACKEND_HOST: '{{.BACKEND_HOST | default "localhost:8080"}}'
    cmds:
      - |
        if curl -sf "http://{{.BACKEND_HOST}}/health" > /dev/null 2>&1; then
          echo "✅ Backend reachable at {{.BACKEND_HOST}}"
        else
          echo "⚠️  Backend at {{.BACKEND_HOST}} not responding — Caddy will retry"
        fi

  dev:connect:stop:
    desc: Stop the Caddy dev proxy
    internal: true
    cmds:
      - caddy stop 2>/dev/null || true

  # === Full Stack Development ===

  dev:backend:
    desc: Start backend infrastructure (NATS + backend) in foreground
    cmds:
      - echo "Starting backend infrastructure..."
      - echo "NATS will be at localhost:4222"
      - echo "Backend API will be at localhost:8080"
      - docker compose -f docker-compose.dev.yml up

  dev:backend:start:
    desc: Start backend infrastructure in background
    env:
      DEV_UI_PORT: "{{.DEV_UI_PORT}}"
      DEV_VITE_PORT: "{{.DEV_VITE_PORT}}"
    cmds:
      - docker compose -f docker-compose.dev.yml up -d
      - echo "✅ Backend infrastructure starting..."
      - echo "   Access UI at http://localhost:{{.DEV_UI_PORT}}"
      - echo "   Run 'task dev:backend:logs' to see logs"
      - echo "   Run 'task dev:backend:stop' to stop"

  dev:backend:stop:
    desc: Stop backend infrastructure
    cmds:
      - docker compose -f docker-compose.dev.yml down
      - echo "✅ Backend infrastructure stopped"

  dev:backend:logs:
    desc: View backend infrastructure logs
    cmds:
      - docker compose -f docker-compose.dev.yml logs -f

  dev:full:
    desc: Start full development stack (backend + frontend)
    env:
      DEV_UI_PORT: "{{.DEV_UI_PORT}}"
      DEV_VITE_PORT: "{{.DEV_VITE_PORT}}"
    cmds:
      - task: dev:backend:start
      - echo "Waiting for Caddy health check..."
      - |
        for i in $(seq 1 30); do
          if curl -s http://localhost:{{.DEV_UI_PORT}}/health > /dev/null 2>&1; then
            echo "✅ Backend ready!"
            break
          fi
          echo "   Waiting... ($i/30)"
          sleep 2
        done
      - echo ""
      - echo "📱 Open http://localhost:{{.DEV_UI_PORT}} in your browser"
      - echo ""
      - npm run dev -- --port {{.DEV_VITE_PORT}} --host

  dev:docker:
    desc: Start UI in Docker (backend at host.docker.internal:8080)
    cmds:
      - echo "Starting UI in Docker..."
      - docker compose up

  dev:with-caddy:
    desc: Start UI + Caddy in Docker (available at http://localhost:3000)
    cmds:
      - echo "Starting UI + Caddy..."
      - docker compose --profile caddy up

  # === Testing ===

  test:
    desc: Run unit tests
    cmds:
      - npm run test

  test:e2e:
    desc: Run E2E tests (auto-manages Docker stack)
    cmds:
      - npm run test:e2e

  test:e2e:agentic:
    desc: Run agentic journey E2E tests (separate stack with mock-llm + agentic.json backend)
    summary: |
      Runs Playwright tests under e2e/agentic/ against the agentic stack
      defined in docker-compose.agentic-e2e.yml. Each spec specifies the
      mock-llm fixture it expects via the FIXTURE env var.

      The agentic stack uses host port 3100 (configurable via
      E2E_AGENTIC_UI_PORT) so it can run alongside the default e2e stack
      on 3000.

      Pass FIXTURE to load a specific mock-llm script:
        FIXTURE=tool-approval-gate.yaml task test:e2e:agentic
    cmds:
      - npm run test:e2e:agentic

  test:e2e:agentic:tool-approval-gate:
    desc: Run the tool-approval-gate journey with its paired fixture
    vars:
      FIXTURE: tool-approval-gate.yaml
      AGENTIC_CONFIG: e2e-agentic.json
    cmds:
      - defer: { task: test:e2e:agentic:cleanup }
      - task: test:e2e:agentic:stack:up
        vars:
          FIXTURE: "{{.FIXTURE}}"
          AGENTIC_CONFIG: "{{.AGENTIC_CONFIG}}"
      - npx playwright test --config playwright.agentic.config.ts e2e/agentic/tool-approval-gate.spec.ts

  test:e2e:agentic:real-time-activity-stream:
    desc: Run the real-time-activity-stream journey with its paired fixture
    vars:
      FIXTURE: real-time-activity-stream.yaml
      AGENTIC_CONFIG: e2e-agentic.json
    cmds:
      - defer: { task: test:e2e:agentic:cleanup }
      - task: test:e2e:agentic:stack:up
        vars:
          FIXTURE: "{{.FIXTURE}}"
          AGENTIC_CONFIG: "{{.AGENTIC_CONFIG}}"
      - npx playwright test --config playwright.agentic.config.ts e2e/agentic/real-time-activity-stream.spec.ts

  test:e2e:agentic:deep-research:
    desc: Run the deep-research journey with researcher config + paired fixture
    vars:
      FIXTURE: deep-research.yaml
      AGENTIC_CONFIG: e2e-deep-research.json
    cmds:
      - defer: { task: test:e2e:agentic:cleanup }
      - task: test:e2e:agentic:stack:up
        vars:
          FIXTURE: "{{.FIXTURE}}"
          AGENTIC_CONFIG: "{{.AGENTIC_CONFIG}}"
      - npx playwright test --config playwright.agentic.config.ts e2e/agentic/deep-research.spec.ts

  test:e2e:agentic:ops-agent:
    desc: Run the ops-agent baseline journey (ADR-027 Phase 1 — 20 researcher loops + ops diagnostic)
    summary: |
      Drives 20 serial researcher loops against the mock LLM, then
      validates that the ops_observe_complete_loops rule spawns an
      ops-analyst loop whose completion cites docs/objectives/deep-research.md.

      Long-running: 20 mock researcher loops take ~100s. Set a generous
      timeout when running under CI.
    vars:
      FIXTURE: ops-agent-baseline.yaml
      AGENTIC_CONFIG: e2e-ops-observer.json
    cmds:
      - defer: { task: test:e2e:agentic:cleanup }
      - task: test:e2e:agentic:stack:up
        vars:
          FIXTURE: "{{.FIXTURE}}"
          AGENTIC_CONFIG: "{{.AGENTIC_CONFIG}}"
      - npx playwright test --config playwright.agentic.config.ts e2e/agentic/ops-agent-baseline.spec.ts

  test:e2e:agentic:dev:
    desc: |
      Boot the agentic E2E stack and leave it running for interactive
      debugging. Skips the deferred cleanup that the test:e2e:agentic:*
      tasks use, so containers stay up until you tear them down with
      `task test:e2e:agentic:cleanup`.

      Defaults to the ops-observer config + ops fixture; override via
      FIXTURE= and AGENTIC_CONFIG= env or args. DEBUG=1 forces debug
      log level on the backend (already the default for e2e configs;
      kept here for parity with future configs).

      Use the probe targets while the stack is up:
        task test:e2e:agentic:probe:loops
        task test:e2e:agentic:probe:send -- "your message"
        task test:e2e:agentic:probe:triples -- ops.diagnosis.finding
        task test:e2e:agentic:logs

      Then re-run a spec without rebooting:
        task test:e2e:agentic:run-spec -- e2e/agentic/ops-agent-baseline.spec.ts
    vars:
      FIXTURE: '{{.FIXTURE | default "ops-agent-baseline.yaml"}}'
      AGENTIC_CONFIG: '{{.AGENTIC_CONFIG | default "e2e-ops-observer.json"}}'
      DEBUG: '{{.DEBUG | default "0"}}'
    cmds:
      - echo "▶︎  Booting stack (FIXTURE={{.FIXTURE}} AGENTIC_CONFIG={{.AGENTIC_CONFIG}} DEBUG={{.DEBUG}}) — no auto-cleanup"
      - task: test:e2e:agentic:stack:up
        vars:
          FIXTURE: "{{.FIXTURE}}"
          AGENTIC_CONFIG: "{{.AGENTIC_CONFIG}}"
      - |
        cat <<'EOF'

        Stack up at http://localhost:3100. Probe with:
          task test:e2e:agentic:probe:loops
          task test:e2e:agentic:probe:send -- 'your message'
          task test:e2e:agentic:probe:triples -- ops.diagnosis.finding
          task test:e2e:agentic:logs
          task test:e2e:agentic:run-spec -- e2e/agentic/ops-agent-baseline.spec.ts

        Tear down with: task test:e2e:agentic:cleanup
        EOF

  test:e2e:agentic:run-spec:
    desc: |
      Run a playwright spec against the already-running stack (booted
      via test:e2e:agentic:dev). Pass the spec path as the first CLI arg.
      Example:
        task test:e2e:agentic:run-spec -- e2e/agentic/ops-agent-baseline.spec.ts
    cmds:
      - npx playwright test --config playwright.agentic.config.ts {{.CLI_ARGS}}

  test:e2e:agentic:logs:
    desc: |
      Tail backend container logs (debug level by default). Pass --since
      via CLI_ARGS, e.g.:
        task test:e2e:agentic:logs -- --since=30s
    cmds:
      - docker compose -f docker-compose.agentic-e2e.yml logs backend {{.CLI_ARGS | default "--tail=100"}}

  test:e2e:agentic:probe:loops:
    desc: List active loops on the running stack (one-line summary per loop)
    cmds:
      - |
        (
          echo -e "loop_id\tstate\titers\toutcome"
          curl -sf http://localhost:3100/teams-dispatch/loops \
            | jq -r '.[] | "\(.loop_id)\t\(.state)\t\(.iterations)/\(.max_iterations)\t\(.outcome // "-")"'
        ) | column -t -s $'\t'

  test:e2e:agentic:probe:send:
    desc: |
      Send a chat message to the running stack. Pass content as CLI arg:
        task test:e2e:agentic:probe:send -- "Research MQTT vs NATS"
    cmds:
      - |
        CONTENT="{{.CLI_ARGS | default "ping"}}"
        curl -sf -X POST http://localhost:3100/teams-dispatch/message \
          -H 'Content-Type: application/json' \
          -d "$(jq -nc --arg c "$CONTENT" '{content:$c}')" \
          | jq

  test:e2e:agentic:probe:triples:
    desc: |
      Query the graph for triples by predicate (semstreams beta.9 endpoint).
      Pass predicate as CLI arg:
        task test:e2e:agentic:probe:triples -- ops.diagnosis.finding
    cmds:
      - |
        PREDICATE="{{.CLI_ARGS}}"
        if [ -z "$PREDICATE" ]; then
          echo "Usage: task test:e2e:agentic:probe:triples -- <predicate>" >&2
          exit 1
        fi
        curl -sf "http://localhost:3100/graph/triples?predicate=$PREDICATE&limit=20" | jq

  test:e2e:agentic:stack:up:
    desc: Start the agentic E2E Docker stack and wait for health
    internal: true
    vars:
      FIXTURE: '{{.FIXTURE | default ""}}'
      AGENTIC_CONFIG: '{{.AGENTIC_CONFIG | default "e2e-agentic.json"}}'
      E2E_AGENTIC_UI_PORT: '{{.E2E_AGENTIC_UI_PORT | default "3100"}}'
    env:
      FIXTURE: "{{.FIXTURE}}"
      AGENTIC_CONFIG: "{{.AGENTIC_CONFIG}}"
      E2E_AGENTIC_UI_PORT: "{{.E2E_AGENTIC_UI_PORT}}"
    cmds:
      - echo "Stack config → AGENTIC_CONFIG={{.AGENTIC_CONFIG}} FIXTURE={{.FIXTURE}}"
      - docker compose -f docker-compose.agentic-e2e.yml build --no-cache backend
      - docker compose -f docker-compose.agentic-e2e.yml up -d
      - |
        PORT="{{.E2E_AGENTIC_UI_PORT}}"
        echo "Waiting for stack at http://localhost:${PORT} ..."
        for i in $(seq 1 60); do
          if curl -sf "http://localhost:${PORT}/health" > /dev/null 2>&1; then
            echo "  Health OK after ${i}s, checking dispatch..."
            # Wait for component HTTP handlers (register slightly after health)
            for j in $(seq 1 10); do
              if curl -sf "http://localhost:${PORT}/teams-dispatch/commands" > /dev/null 2>&1; then
                echo "✅ Stack ready (health + dispatch) after ~$((i + j))s"
                exit 0
              fi
              sleep 1
            done
            echo "⚠️  Health OK but dispatch not responding"
          fi
          sleep 3
        done
        echo "❌ Stack failed to become ready after 180s"
        docker compose -f docker-compose.agentic-e2e.yml logs backend --tail 20
        exit 1

  test:e2e:superpowers:
    desc: Run all agentic journey specs (each with its own fixture and fresh stack)
    summary: |
      Runs every agentic journey spec under e2e/agentic/ with its paired
      mock-llm fixture, tearing down the docker stack between runs so
      mock-llm reloads the right fixture for each journey.

      Slow (each journey re-builds and re-boots the stack — roughly
      2-3 minutes per journey on first run) but deterministic. Prefer
      the individual convenience targets (task test:e2e:agentic:<slug>)
      for iterative development.

      The trailing `defer` ensures the docker stack is torn down even
      if a journey fails mid-run.
    cmds:
      - task: test:e2e:agentic:tool-approval-gate
      - task: test:e2e:agentic:real-time-activity-stream
      - task: test:e2e:agentic:deep-research
      - task: test:e2e:agentic:ops-agent

  test:e2e:agentic:cleanup:
    desc: Tear down the agentic E2E Docker stack
    cmds:
      - npm run test:e2e:agentic:cleanup

  test:all:
    desc: Run all tests
    cmds:
      - npm run test:all

  # === Linting and Formatting ===

  lint:
    desc: Run ESLint
    cmds:
      - npm run lint

  format:
    desc: Format code with Prettier
    cmds:
      - npm run format

  check:
    desc: Run type checking
    cmds:
      - npm run check

  # === CI ===

  ci:
    desc: Run all CI checks
    cmds:
      - task: lint
      - task: check
      - task: test
      - task: generate-types:check

  # === Cleanup ===

  clean:
    desc: Clean Docker volumes and containers
    cmds:
      - docker compose -f docker-compose.yml down -v
      - docker compose -f docker-compose.e2e.yml down -v
      - echo "✅ Cleaned up Docker resources"
