version: "3"

# Journey spec validation — see docs/journeys/README.md for the format.
#
# Validates that every docs/journeys/*.md file (except README.md) has
# well-formed YAML frontmatter with the required fields, and that the
# referenced fixture exists under test/fixtures/journeys/.
#
# Does NOT run the journey — that's what Go E2E observers (test/e2e/)
# and Playwright specs (ui/e2e/agentic/) do.

tasks:
  validate:
    desc: Validate journey docs in docs/journeys/ for required frontmatter and fixture refs
    silent: true
    cmds:
      - |
        set -euo pipefail

        JOURNEYS_DIR="docs/journeys"
        FIXTURES_DIR="test/fixtures/journeys"

        if [ ! -d "$JOURNEYS_DIR" ]; then
          echo "ERROR: $JOURNEYS_DIR does not exist"
          exit 1
        fi

        errors=0
        journey_count=0

        # Required frontmatter fields, one per line.
        required_fields="id version backend_capabilities fixture endpoints"

        for file in "$JOURNEYS_DIR"/*.md; do
          [ -f "$file" ] || continue
          base=$(basename "$file")
          [ "$base" = "README.md" ] && continue

          journey_count=$((journey_count + 1))
          stem="${base%.md}"

          # Must start with YAML frontmatter delimiter on line 1.
          if [ "$(head -1 "$file")" != "---" ]; then
            echo "ERROR: $file missing YAML frontmatter (line 1 must be '---')"
            errors=$((errors + 1))
            continue
          fi

          # Extract frontmatter block between the first pair of --- markers.
          frontmatter=$(awk '/^---$/{c++; next} c==1{print} c==2{exit}' "$file")

          if [ -z "$frontmatter" ]; then
            echo "ERROR: $file frontmatter block is empty or unterminated"
            errors=$((errors + 1))
            continue
          fi

          # Check required fields present (top-level keys).
          for field in $required_fields; do
            if ! printf "%s\n" "$frontmatter" | grep -qE "^${field}:"; then
              echo "ERROR: $file missing frontmatter field: ${field}:"
              errors=$((errors + 1))
            fi
          done

          # Check id: matches filename stem.
          declared_id=$(printf "%s\n" "$frontmatter" | sed -n 's/^id:[[:space:]]*\([^[:space:]#]*\).*/\1/p' | head -1)
          if [ -n "$declared_id" ] && [ "$declared_id" != "$stem" ]; then
            echo "ERROR: $file id '$declared_id' does not match filename stem '$stem'"
            errors=$((errors + 1))
          fi

          # Check fixture: references an existing file under test/fixtures/journeys/.
          fixture=$(printf "%s\n" "$frontmatter" | sed -n 's/^fixture:[[:space:]]*\([^[:space:]#]*\).*/\1/p' | head -1)
          if [ -n "$fixture" ] && [ ! -f "$FIXTURES_DIR/$fixture" ]; then
            echo "ERROR: $file references missing fixture: $FIXTURES_DIR/$fixture"
            errors=$((errors + 1))
          fi

          # Check ui_components: paths exist (best-effort — ui/ may not be
          # present on all branches).
          if [ -d "ui" ]; then
            in_list=0
            printf "%s\n" "$frontmatter" | while IFS= read -r line; do
              case "$line" in
                ui_components:*)
                  in_list=1
                  continue
                  ;;
                "  - "*)
                  if [ "$in_list" = "1" ]; then
                    path=$(printf "%s\n" "$line" | sed 's/^  - //')
                    if [ ! -f "$path" ]; then
                      echo "ERROR: $file references missing UI component: $path"
                      exit 1
                    fi
                  fi
                  ;;
                *)
                  in_list=0
                  ;;
              esac
            done || errors=$((errors + 1))
          fi
        done

        if [ "$errors" -gt 0 ]; then
          echo ""
          echo "✖ $errors journey validation error(s)"
          exit 1
        fi

        echo "✓ Validated $journey_count journey doc(s) in $JOURNEYS_DIR"
