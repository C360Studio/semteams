version: "3"

tasks:
  check-ports:
    desc: Check if required E2E ports are available
    silent: false
    cmds:
      - |
        echo "[CHECK] Verifying ports are available..."
        if lsof -Pi :8080 -sTCP:LISTEN -t >/dev/null 2>&1; then
          echo "[ERROR] Port 8080 is already in use"
          lsof -Pi :8080 -sTCP:LISTEN
          exit 1
        fi
      - |
        if lsof -Pi :14550 -t >/dev/null 2>&1; then
          echo "[ERROR] Port 14550 (UDP) is already in use"
          lsof -i :14550
          exit 1
        fi
      - echo "[OK] All ports available"

  clean:
    desc: Clean E2E test environment
    silent: false
    cmds:
      - echo "[E2E CLEAN] Cleaning SemStreams E2E environment..."
      - docker compose -f docker/compose/e2e.yml down -v --timeout 15 2>/dev/null || true
      - docker compose -f docker/compose/federation.yml down -v --timeout 15 2>/dev/null || true
      - docker compose -f docker/compose/rules.yml down -v --timeout 15 2>/dev/null || true
      - docker compose -f docker/compose/gateway.yml down -v --timeout 15 2>/dev/null || true
      - docker compose -f docker/compose/tiered.yml --profile statistical down -v --timeout 15 2>/dev/null || true
      - docker compose -f docker/compose/tiered.yml --profile semantic down -v --timeout 15 2>/dev/null || true
      - docker volume ls -q --filter name=semstreams | xargs -r docker volume rm 2>/dev/null || true
      - docker volume ls -q --filter name=semembed | xargs -r docker volume rm 2>/dev/null || true
      - docker volume ls -q --filter name=shimmy | xargs -r docker volume rm 2>/dev/null || true
      - docker volume ls -q --filter name=nats-semstreams | xargs -r docker volume rm 2>/dev/null || true
      - echo "[OK] E2E environment cleaned"
