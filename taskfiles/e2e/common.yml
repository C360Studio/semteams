version: "3"

tasks:
  check-ports:
    desc: Check if required E2E ports are available
    silent: false
    cmds:
      - |
        echo "[CHECK] Verifying ports are available..."
        if lsof -Pi :38080 -sTCP:LISTEN -t >/dev/null 2>&1; then
          echo "[ERROR] Port 38080 is already in use"
          lsof -Pi :38080 -sTCP:LISTEN
          exit 1
        fi
      - |
        if lsof -Pi :34550 -t >/dev/null 2>&1; then
          echo "[ERROR] Port 34550 (UDP) is already in use"
          lsof -i :34550
          exit 1
        fi
      - echo "[OK] All ports available"

  clean:
    desc: Clean E2E test environment
    silent: false
    cmds:
      - echo "[E2E CLEAN] Cleaning SemStreams E2E environment..."
      - docker compose -f docker/compose/e2e.yml down -v --timeout 15 2>/dev/null || true
      - docker compose -f docker/compose/tiered.yml --profile structural down -v --timeout 15 2>/dev/null || true
      - docker compose -f docker/compose/tiered.yml --profile statistical down -v --timeout 15 2>/dev/null || true
      - docker compose -f docker/compose/tiered.yml --profile semantic down -v --timeout 15 2>/dev/null || true
      - docker volume ls -q --filter name=semstreams | xargs -r docker volume rm 2>/dev/null || true
      - docker volume ls -q --filter name=semembed | xargs -r docker volume rm 2>/dev/null || true
      - docker volume ls -q --filter name=shimmy | xargs -r docker volume rm 2>/dev/null || true
      - docker volume ls -q --filter name=nats-semstreams | xargs -r docker volume rm 2>/dev/null || true
      - echo "[OK] E2E environment cleaned"

  analyze-profiles:
    desc: List available pprof profiles and show analysis commands
    silent: false
    cmds:
      - |
        echo "[PROFILES] Looking for captured profiles..."
        if ls test/e2e/results/profiles/*.pprof 2>/dev/null; then
          echo ""
          echo "To analyze a profile:"
          echo "  go tool pprof <profile.pprof>"
          echo ""
          echo "Common pprof commands:"
          echo "  top10        - Show top 10 consumers"
          echo "  top20 -cum   - Show top 20 by cumulative time"
          echo "  web          - Open interactive graph (requires graphviz)"
          echo "  list <func>  - Show annotated source for function"
          echo ""
          echo "Compare profiles:"
          echo "  go tool pprof -diff_base=before.pprof after.pprof"
        else
          echo "No profiles found in test/e2e/results/profiles/"
          echo ""
          echo "To capture profiles, run e2e tests with profiling enabled:"
          echo "  SEMSTREAMS_DEBUG=true task e2e:core"
        fi

  clean-profiles:
    desc: Remove all captured pprof profiles
    silent: false
    cmds:
      - |
        echo "[CLEAN] Removing captured profiles..."
        rm -rf test/e2e/results/profiles/*.pprof test/e2e/results/profiles/*.out 2>/dev/null || true
        echo "[OK] Profiles cleaned"
