version: "3"

# Gateway E2E tests: GraphQL and MCP gateway validation
# Runs against statistical tier (no ML dependencies for CI)

tasks:
  default:
    desc: "Gateway tests: GraphQL + MCP APIs (~20s)"
    silent: false
    deps: [":e2e:clean", ":e2e:check-ports", ":build:e2e"]
    cmds:
      - echo "[GATEWAY] Starting gateway E2E tests..."
      - docker compose -f docker/compose/gateway.yml up -d --wait
      - echo "[OK] Gateway services are healthy"
      - echo "[GATEWAY] Running GraphQL gateway tests..."
      - cmd: cd cmd/e2e && ./e2e --scenario gateway-graphql --output-dir ./test/e2e/results
        ignore_error: true
      - echo "[GATEWAY] Running MCP gateway tests..."
      - cmd: cd cmd/e2e && ./e2e --scenario gateway-mcp --output-dir ./test/e2e/results
        ignore_error: true
      - docker compose -f docker/compose/gateway.yml down -v --timeout 15
