version: "3"

# Federation E2E tests: Edge-to-cloud + rules-graph integration

tasks:
  default:
    desc: Run federation E2E tests (WebSocket + rules-graph)
    silent: false
    deps: [":e2e:clean", ":e2e:check-ports", ":build:e2e"]
    cmds:
      # WebSocket federation (edge-to-cloud)
      - echo "[FEDERATION] Starting edge-to-cloud federation test..."
      - docker compose -f docker/compose/federation.yml up -d --wait
      - echo "[OK] Federation services are healthy (edge + cloud instances)"
      - cmd: cd cmd/e2e && ./e2e --scenario core-federation
        ignore_error: true
      - docker compose -f docker/compose/federation.yml down -v --timeout 15
      - sleep 3
      # Rules-graph integration
      - echo "[FEDERATION] Starting rules-graph integration test..."
      - docker compose -f docker/compose/structural.yml up -d --wait
      - echo "[OK] Services are healthy (rule + graph processors)"
      - cmd: cd cmd/e2e && ./e2e --scenario rules-graph
        ignore_error: true
      - docker compose -f docker/compose/structural.yml down -v --timeout 15
      - echo "[OK] Federation tests complete"
