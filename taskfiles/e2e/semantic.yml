version: "3"

# Semantic Tier: Neural embeddings, LLM summaries, semantic search
# Requires external ML services: SemEmbed, SemInstruct

tasks:
  default:
    desc: "Semantic tier: Neural embeddings + LLM (~90s)"
    silent: false
    deps: [":e2e:clean", ":e2e:check-ports", ":build:e2e"]
    cmds:
      - echo "[SEMANTIC] Starting semantic tier E2E test (SemEmbed + SemInstruct)..."
      - docker compose -f docker/compose/tiered.yml --profile semantic up -d --wait --build
      - echo "[OK] ML services are healthy (SemEmbed + SemInstruct)"
      - echo "[SEMANTIC] Running semantic tier scenario..."
      # ML app runs on port 8180 (HTTP), 9190 (metrics), 14650 (UDP) to avoid conflict
      - cmd: cd cmd/e2e && ./e2e --scenario tiered --variant semantic --base-url http://localhost:8180 --udp-endpoint localhost:14650 --metrics-url http://localhost:9190 --output-dir ./test/e2e/results
        ignore_error: true
      - docker compose -f docker/compose/tiered.yml --profile semantic down -v --timeout 15

  debug:
    desc: Start semantic tier for debugging (leaves containers running)
    silent: false
    deps: [":e2e:clean", ":e2e:check-ports"]
    cmds:
      - echo "[SEMANTIC DEBUG] Starting semantic tier environment..."
      - docker compose -f docker/compose/tiered.yml --profile semantic up -d --wait --build
      - echo "[OK] ML services are healthy (SemEmbed + SemInstruct)"
      - echo ""
      - echo "[SEMANTIC DEBUG] Environment is running. Use the following commands:"
      - echo "  docker logs -f semstreams-tiered-app-ml       (Follow app logs)"
      - echo "  docker logs -f semstreams-tiered-semembed     (Follow SemEmbed logs)"
      - echo "  docker logs -f semstreams-tiered-seminstruct  (Follow SemInstruct logs)"
      - echo "  docker logs -f semstreams-tiered-nats         (Follow NATS logs)"
      - echo "  curl http://localhost:8180/health             (Test health endpoint)"
      - echo "  task e2e:clean                                (Clean up when done)"

  fallback:
    desc: "Test graceful degradation: semantic config WITHOUT ML services"
    silent: false
    deps: [":e2e:clean", ":e2e:check-ports", ":build:e2e"]
    cmds:
      - echo "[SEMANTIC-FALLBACK] Testing semantic config graceful degradation (no ML services)..."
      - echo "[SEMANTIC-FALLBACK] Starting NATS only (no semembed/seminstruct)..."
      # Use statistical profile (just NATS + app) but with semantic config
      - docker compose -f docker/compose/tiered.yml --profile statistical up -d --wait --build
      - echo "[OK] Services started without ML services"
      - echo "[SEMANTIC-FALLBACK] Running fallback scenario..."
      # Run with semantic-fallback variant to trigger fallback validation
      - cmd: cd cmd/e2e && ./e2e --scenario tiered --variant semantic-fallback --output-dir ./test/e2e/results
        ignore_error: true
      - docker compose -f docker/compose/tiered.yml --profile statistical down -v --timeout 15

  compare:
    desc: Run statistical vs semantic and generate comparison report
    silent: false
    deps: [":e2e:clean", ":e2e:check-ports", ":build:e2e"]
    cmds:
      - echo "[COMPARE] Running statistical variant first..."
      - docker compose -f docker/compose/tiered.yml --profile statistical up -d --wait
      - cmd: cd cmd/e2e && ./e2e --scenario tiered --variant statistical --output-dir ./test/e2e/results
        ignore_error: true
      - docker compose -f docker/compose/tiered.yml --profile statistical down -v --timeout 15
      - echo "[COMPARE] Running semantic variant second..."
      - sleep 5
      - docker compose -f docker/compose/tiered.yml --profile semantic up -d --wait --build
      - cmd: cd cmd/e2e && ./e2e --scenario tiered --variant semantic --base-url http://localhost:8180 --udp-endpoint localhost:14650 --metrics-url http://localhost:9190 --output-dir ./test/e2e/results
        ignore_error: true
      - docker compose -f docker/compose/tiered.yml --profile semantic down -v --timeout 15
      - echo "[COMPARE] Generating comparison report..."
      - cmd: cd cmd/e2e && ./e2e --analyze-comparison --output-dir ./test/e2e/results
        ignore_error: true
      - echo "[OK] Comparison report generated in ./test/e2e/results/"
