version: "3"

# Structural Tier: Rules, explicit triples, topology analysis
# No embeddings, no external ML dependencies - deterministic behavior

tasks:
  default:
    desc: "Structural tier: Rules + structural inference (~30s)"
    silent: false
    deps: [":e2e:clean", ":e2e:check-ports", ":build:e2e"]
    cmds:
      - echo "[STRUCTURAL] Starting structural tier E2E test..."
      - docker compose -f docker/compose/rules.yml up -d --wait
      - echo "[OK] Services are healthy (rules + graph)"
      - echo "[STRUCTURAL] Running structural tier scenario..."
      - cmd: cd cmd/e2e && ./e2e --scenario tiered --variant structural --output-dir ./test/e2e/results
        ignore_error: true
      - docker compose -f docker/compose/rules.yml down -v --timeout 15
