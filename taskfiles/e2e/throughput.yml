version: "3"

# Throughput Tier: High-volume stress testing with profiling + query load
# Sends 10,000+ messages, then hammers GraphQL queries to profile the NATS query path

tasks:
  default:
    desc: "Throughput + query load with profiling (~60s)"
    silent: false
    deps: [":e2e:clean", ":e2e:check-ports", ":build:e2e"]
    env:
      SEMSTREAMS_DEBUG: "true"
    cmds:
      - 'echo "[THROUGHPUT] Starting throughput scenario with query load + profiling..."'
      - docker compose -f docker/compose/tiered.yml --profile statistical up -d --wait --build
      - 'echo "[OK] Services ready (pprof enabled on port 36060, GraphQL on port 38082)"'
      - 'echo "[THROUGHPUT] Running throughput scenario (10,000 messages + 15s query load)..."'
      - cmd: cd cmd/e2e && ./e2e --scenario throughput --output-dir ./test/e2e/results
        ignore_error: true
      - docker compose -f docker/compose/tiered.yml --profile statistical down -v --timeout 15
      - 'echo ""'
      - 'echo "Profiles saved to test/e2e/results/profiles/"'
      - 'echo "Analyze CPU: go tool pprof test/e2e/results/profiles/throughput-query-cpu.pprof"'
      - 'echo "Analyze heap: go tool pprof test/e2e/results/profiles/throughput-post-query-heap.pprof"'

  quick:
    desc: "Quick throughput test (1,000 messages, no profiling, no query load)"
    silent: false
    deps: [":e2e:clean", ":e2e:check-ports", ":build:e2e"]
    cmds:
      - 'echo "[THROUGHPUT-QUICK] Quick throughput test (1,000 messages)..."'
      - docker compose -f docker/compose/e2e.yml up -d --wait --build
      - 'echo "[OK] Services ready"'
      - cmd: cd cmd/e2e && ./e2e --scenario throughput --message-count 1000 --graphql-url ""
        ignore_error: true
      - docker compose -f docker/compose/e2e.yml down -v --timeout 15

  heavy:
    desc: "Heavy throughput test (50,000 messages + query load)"
    silent: false
    deps: [":e2e:clean", ":e2e:check-ports", ":build:e2e"]
    env:
      SEMSTREAMS_DEBUG: "true"
    cmds:
      - 'echo "[THROUGHPUT-HEAVY] Heavy throughput test (50,000 messages + query load)..."'
      - docker compose -f docker/compose/tiered.yml --profile statistical up -d --wait --build
      - 'echo "[OK] Services ready (pprof enabled)"'
      - cmd: cd cmd/e2e && ./e2e --scenario throughput --message-count 50000 --output-dir ./test/e2e/results
        ignore_error: true
      - docker compose -f docker/compose/tiered.yml --profile statistical down -v --timeout 15
      - 'echo ""'
      - 'echo "Profiles saved to test/e2e/results/profiles/"'

  profile:
    desc: "Full profiling with block + mutex profiles (~90s)"
    silent: false
    deps: [":e2e:clean", ":e2e:check-ports", ":build:e2e"]
    env:
      SEMSTREAMS_DEBUG: "true"
    cmds:
      - 'echo "[THROUGHPUT-PROFILE] Full profiling run (10,000 messages + 15s query load + block/mutex)..."'
      - docker compose -f docker/compose/tiered.yml --profile statistical up -d --wait --build
      - 'echo "[OK] Services ready (pprof enabled)"'
      - cmd: cd cmd/e2e && ./e2e --scenario throughput --output-dir ./test/e2e/results --profile-all
        ignore_error: true
      - docker compose -f docker/compose/tiered.yml --profile statistical down -v --timeout 15
      - 'echo ""'
      - 'echo "Profiles saved to test/e2e/results/profiles/"'
      - 'echo "Includes: CPU, heap, goroutine, allocs, block, mutex profiles"'

  sla:
    desc: "SLA validation: 14K entities + concurrent queries (P99 < 2s, errors < 5%)"
    silent: false
    deps: [":e2e:clean", ":e2e:check-ports", ":build:e2e"]
    env:
      SEMSTREAMS_DEBUG: "true"
    cmds:
      - 'echo "[THROUGHPUT-SLA] 14K synthetic entities + concurrent query load with SLA assertions..."'
      - docker compose -f docker/compose/tiered.yml --profile statistical up -d --wait --build
      - 'echo "[OK] Services ready"'
      - cmd: >
          cd cmd/e2e && ./e2e --scenario throughput
          --unique-entities 14000
          --query-during-ingestion
          --max-query-p99-ms 2000
          --max-query-error-rate 0.05
          --output-dir ./test/e2e/results
        ignore_error: true
      - docker compose -f docker/compose/tiered.yml --profile statistical down -v --timeout 15
      - 'echo ""'
      - 'echo "Results saved to test/e2e/results/"'

  debug:
    desc: "Start services for manual throughput testing"
    silent: false
    deps: [":e2e:clean", ":e2e:check-ports"]
    env:
      SEMSTREAMS_DEBUG: "true"
    cmds:
      - 'echo "[THROUGHPUT-DEBUG] Starting services for manual testing..."'
      - docker compose -f docker/compose/tiered.yml --profile statistical up -d --wait --build
      - 'echo "[OK] Services ready"'
      - 'echo ""'
      - 'echo "Endpoints:"'
      - 'echo "  HTTP:    http://localhost:38080"'
      - 'echo "  GraphQL: http://localhost:38082/graphql"'
      - 'echo "  Metrics: http://localhost:39090/metrics"'
      - 'echo "  PProf:   http://localhost:36060/debug/pprof/"'
      - 'echo "  UDP:     localhost:34550"'
      - 'echo ""'
      - 'echo "Run test manually:"'
      - 'echo "  cd cmd/e2e && ./e2e --scenario throughput --message-count 10000"'
      - 'echo ""'
      - 'echo "Capture profiles manually:"'
      - 'echo "  curl http://localhost:36060/debug/pprof/heap > heap.pprof"'
      - "echo \"  curl 'http://localhost:36060/debug/pprof/profile?seconds=30' > cpu.pprof\""
      - 'echo ""'
      - 'echo "Stop: task e2e:clean"'
