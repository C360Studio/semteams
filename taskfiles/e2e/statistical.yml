version: "3"

# Statistical Tier: BM25 embeddings, TF-IDF summaries, keyword search
# No external ML dependencies - uses pure Go implementations

tasks:
  default:
    desc: "Statistical tier: BM25 + community detection (~60s)"
    silent: false
    deps: [":e2e:clean", ":e2e:check-ports", ":build:e2e"]
    cmds:
      - echo "[STATISTICAL] Starting statistical tier E2E test (BM25, no external ML)..."
      - docker compose -f docker/compose/tiered.yml --profile statistical up -d --wait
      - echo "[OK] Statistical services are healthy (BM25 mode)"
      - echo "[STATISTICAL] Running statistical tier scenario..."
      - cmd: cd cmd/e2e && ./e2e --scenario tiered --variant statistical --output-dir ./test/e2e/results
        ignore_error: true
      - docker compose -f docker/compose/tiered.yml --profile statistical down -v --timeout 15
