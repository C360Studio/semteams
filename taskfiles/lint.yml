version: '3'

tasks:
  default:
    desc: Run Go linters (vet, fmt, revive)
    cmds:
      # go vet/fmt respect go.mod boundaries and correctly skip ui/e2e/fixtures/semsource
      # (which is its own module). revive walks the filesystem, so we exclude ui/ explicitly.
      - go vet ./...
      - go fmt ./...
      - revive -config revive.toml -formatter friendly -exclude ./ui/... ./...
