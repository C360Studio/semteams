version: "3"

tasks:
  default:
    desc: Run all unit tests
    cmds:
      - go test ./...

  race:
    desc: Run tests with race detector
    cmds:
      - go test -race ./...

  integration:
    desc: Run integration tests (uses testcontainers for Docker infra)
    env:
      # Disable Ryuk (testcontainers resource reaper) to avoid known bugs:
      # - Race condition with session IDs (#2445)
      # - Container removed before starting (#2596)
      # Container cleanup is handled by t.Cleanup() and defer container.Terminate()
      TESTCONTAINERS_RYUK_DISABLED: "true"
    cmds:
      - echo "[INTEGRATION] Running integration tests with real NATS (via testcontainers)..."
      - go test -race -tags=integration ./...
      - echo "[OK] Integration tests complete"

  integration:iot:
    desc: Run IoT sensor integration tests only
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    cmds:
      - echo "[INTEGRATION] Running IoT sensor integration tests..."
      - go test -race -tags=integration -v ./examples/processors/iot_sensor/...
      - echo "[OK] IoT sensor integration tests complete"

  integration:graph:
    desc: Run graph processor integration tests
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    cmds:
      - echo "[INTEGRATION] Running graph processor integration tests..."
      - go test -race -tags=integration -v ./processor/graph/...
      - echo "[OK] Graph processor integration tests complete"
