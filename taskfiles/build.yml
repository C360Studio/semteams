version: '3'

tasks:
  default:
    desc: Build SemStreams binary
    cmds:
      - go build -o bin/semstreams ./cmd/semstreams
      - echo "Built bin/semstreams"

  e2e:
    desc: Build E2E test binary
    cmds:
      - cd cmd/e2e && go build -o e2e .
      - echo "Built cmd/e2e/e2e"

  e2e-semstreams:
    desc: Build E2E SemStreams application (with test workflows)
    cmds:
      - go build -o bin/e2e-semstreams ./cmd/e2e-semstreams
      - echo "Built bin/e2e-semstreams"
