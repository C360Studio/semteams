# Prometheus configuration for SemStreams
#
# This configuration scrapes metrics from SemStreams components.
# All metrics are exposed at a single endpoint with component labels.

global:
  scrape_interval: 15s # How frequently to scrape targets
  evaluation_interval: 15s # How frequently to evaluate rules

  # Attach these labels to any time series or alerts
  external_labels:
    monitor: "semstreams"
    environment: "local"

# Scrape configurations
scrape_configs:
  # SemStreams unified metrics endpoint
  # All component metrics are exposed here with 'component' labels
  - job_name: "semstreams"
    static_configs:
      - targets:
          # Primary SemStreams instance (e2e.yml, tiered.yml statistical profile)
          - "host.docker.internal:9090"
        labels:
          tier: "primary"
      - targets:
          # Secondary SemStreams instance (tiered.yml semantic profile)
          - "host.docker.internal:9190"
        labels:
          tier: "semantic"
    metrics_path: "/metrics"
    scrape_interval: 10s
    scrape_timeout: 5s
    # Relabel to add instance info
    relabel_configs:
      - source_labels: [__address__]
        regex: ".*:9090"
        target_label: instance
        replacement: "statistical"
      - source_labels: [__address__]
        regex: ".*:9190"
        target_label: instance
        replacement: "semantic"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    scrape_interval: 15s
    scrape_timeout: 5s

