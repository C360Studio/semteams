version: "3"

includes:
  build:
    taskfile: ./taskfiles/build.yml
    aliases: [b]
  test:
    taskfile: ./taskfiles/test.yml
    aliases: [t]
  lint:
    taskfile: ./taskfiles/lint.yml
    aliases: [l]
  clean:
    taskfile: ./taskfiles/clean.yml
  schema:
    taskfile: ./taskfiles/schema.yml
  services:
    taskfile: ./taskfiles/services.yml

  # E2E test taskfiles
  e2e:
    taskfile: ./taskfiles/e2e/common.yml
  e2e:core:
    taskfile: ./taskfiles/e2e/core.yml
  e2e:structural:
    taskfile: ./taskfiles/e2e/structural.yml
  e2e:statistical:
    taskfile: ./taskfiles/e2e/statistical.yml
  e2e:semantic:
    taskfile: ./taskfiles/e2e/semantic.yml
  e2e:federation:
    taskfile: ./taskfiles/e2e/federation.yml
  e2e:gateway:
    taskfile: ./taskfiles/e2e/gateway.yml

tasks:
  # Default task
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # Observability shortcuts
  observe:up:
    desc: Start Prometheus + Grafana for local monitoring
    cmds:
      - task: services:start:observability

  observe:down:
    desc: Stop observability stack
    cmds:
      - task: services:stop

  observe:logs:
    desc: Tail Prometheus and Grafana logs
    cmds:
      - docker compose -f docker/compose/services.yml --profile observability logs -f

  # Composite tasks
  check:
    desc: Run all checks (lint + test)
    cmds:
      - task: lint:default
      - task: test:default

  # E2E composite tasks
  e2e:tiers:
    desc: Run all tier E2E tests (structural -> statistical -> semantic)
    silent: false
    deps: [e2e:clean, e2e:check-ports, build:e2e]
    cmds:
      - 'echo "[TIERS] Running all inference tier E2E tests..."'
      - 'echo ""'
      - 'echo "=== STRUCTURAL (Rules-Only) ==="'
      - docker compose -f docker/compose/rules.yml up -d --wait
      - cmd: cd cmd/e2e && ./e2e --scenario tier0-rules-iot --output-dir ./test/e2e/results
        ignore_error: true
      - docker compose -f docker/compose/rules.yml down -v --timeout 15
      - sleep 3
      - 'echo ""'
      - 'echo "=== STATISTICAL (BM25 + LPA) ==="'
      - docker compose -f docker/compose/tiered.yml --profile statistical up -d --wait
      - cmd: cd cmd/e2e && ./e2e --scenario tiered --variant core --output-dir ./test/e2e/results
        ignore_error: true
      - docker compose -f docker/compose/tiered.yml --profile statistical down -v --timeout 15
      - sleep 3
      - 'echo ""'
      - 'echo "=== SEMANTIC (Neural + LLM) ==="'
      - docker compose -f docker/compose/tiered.yml --profile semantic up -d --wait
      - cmd: cd cmd/e2e && ./e2e --scenario tiered --variant ml --base-url http://localhost:8180 --udp-endpoint localhost:14650 --metrics-url http://localhost:9190 --output-dir ./test/e2e/results
        ignore_error: true
      - docker compose -f docker/compose/tiered.yml --profile semantic down -v --timeout 15
      - 'echo ""'
      - 'echo "[TIERS] Generating comparison report..."'
      - cmd: cd cmd/e2e && ./e2e --compare-tiers --output-dir ./test/e2e/results
        ignore_error: true
      - 'echo "[OK] All tier tests complete. Results in ./test/e2e/results/"'

  e2e:all:
    desc: Run all E2E tests (core -> structural -> statistical -> semantic -> gateway)
    cmds:
      - task: e2e:core
      - task: e2e:structural
      - task: e2e:statistical
      - task: e2e:semantic
      - task: e2e:gateway
