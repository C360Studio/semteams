version: "3"

dotenv: ['.env']

includes:
  build:
    taskfile: ./taskfiles/build.yml
    aliases: [b]
  test:
    taskfile: ./taskfiles/test.yml
    aliases: [t]
  lint:
    taskfile: ./taskfiles/lint.yml
    aliases: [l]
  clean:
    taskfile: ./taskfiles/clean.yml
  schema:
    taskfile: ./taskfiles/schema.yml
  services:
    taskfile: ./taskfiles/services.yml
  dev:
    taskfile: ./taskfiles/dev.yml
    aliases: [d]

  # Frontend (Svelte 5 + SvelteKit) — see ui/Taskfile.yml for full surface.
  ui:
    taskfile: ./ui/Taskfile.yml
    dir: ./ui

tasks:
  # Default task
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # Observability shortcuts
  observe:up:
    desc: Start Prometheus + Grafana for local monitoring
    cmds:
      - task: services:start:observability

  observe:down:
    desc: Stop observability stack
    cmds:
      - task: services:stop

  observe:logs:
    desc: Tail Prometheus and Grafana logs
    cmds:
      - docker compose -f docker/compose/services.yml --profile observability logs -f

  # Composite tasks
  check:
    desc: Run Go checks (lint + test). Fast — no Node required.
    cmds:
      - task: lint:default
      - task: test:default

  check:all:
    desc: Run Go + UI checks (lint, type-check, test, build). Requires Node.
    cmds:
      - task: lint:default
      - task: test:default
      - task: ui:lint
      - task: ui:check
      - task: ui:test
      - task: ui:build
