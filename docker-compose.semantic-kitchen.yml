# E2E Test Environment for SemStreams Kitchen Sink (Full Semantic Stack)
#
# ⚠️  THIS FILE IS FOR KITCHEN SINK E2E TESTING ONLY - DO NOT USE DIRECTLY ⚠️
#
# This compose file is designed to work with task commands:
#   - task e2e:semantic-kitchen-sink         - Run with all features (ML enabled)
#   - task e2e:semantic-kitchen-sink-core    - Run CI-safe (no ML services)
#   - task e2e:clean                         - Clean up test environment
#
# Profiles:
#   - (default): NATS + semstreams (CI-safe, no ML dependencies)
#   - ml: Adds semembed + seminstruct + shimmy for full semantic testing
#
# Usage:
#   docker compose -f docker-compose.semantic-kitchen.yml up -d              # Core only
#   docker compose -f docker-compose.semantic-kitchen.yml --profile ml up -d # With ML
#
# Running this directly will start services but NOT run tests.
# The E2E tests are executed from the host via cmd/e2e/e2e binary.
#
# Following Observer Pattern: E2E tests are external observers of the running system
services:
  # SemEmbed - Lightweight embedding service using fastembed-rs
  # For semantic search testing with OpenAI-compatible API
  # PROFILE: ml - Only started when --profile ml is specified
  semembed:
    image: ghcr.io/c360studio/semembed:latest
    container_name: semstreams-kitchen-semembed
    profiles:
      - ml
    ports:
      - "8081:8081"  # OpenAI-compatible /v1/embeddings endpoint
    environment:
      - SEMEMBED_MODEL=BAAI/bge-small-en-v1.5
      - SEMEMBED_PORT=8081
      - RUST_LOG=info
    volumes:
      - semembed-kitchen-cache:/home/semembed/.cache/fastembed
    networks:
      - semstreams-kitchen-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Shimmy - Inference backend (model loading, heavy compute)
  # Downloads and runs Mistral-7B-Instruct for LLM inference
  # PROFILE: ml - Only started when --profile ml is specified
  shimmy:
    image: ghcr.io/c360studio/semshimmy:latest
    container_name: semstreams-kitchen-shimmy
    profiles:
      - ml
    environment:
      - RUST_LOG=info
    volumes:
      - shimmy-kitchen-cache:/root/.cache/huggingface
    networks:
      - semstreams-kitchen-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11435/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s  # Model download takes time (~4GB first run)

  # SemInstruct - OpenAI-compatible proxy to shimmy
  # Lightweight proxy with retry logic and metrics
  # PROFILE: ml - Only started when --profile ml is specified
  seminstruct:
    image: ghcr.io/c360studio/seminstruct:latest
    container_name: semstreams-kitchen-seminstruct
    profiles:
      - ml
    ports:
      - "8084:8083"  # OpenAI-compatible /v1/chat/completions
    environment:
      - SEMINSTRUCT_SHIMMY_URL=http://shimmy:11435
      - SEMINSTRUCT_PORT=8083
      - RUST_LOG=info
    depends_on:
      shimmy:
        condition: service_healthy
    networks:
      - semstreams-kitchen-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # NATS Server with JetStream
  nats:
    image: nats:2.11.7-alpine
    container_name: semstreams-kitchen-nats
    ports:
      - "4222:4222" # Client connections
      - "8222:8222" # HTTP monitoring
    command:
      ["-js", "-sd", "/data", "-m", "8222", "--name", "semstreams-kitchen-nats"]
    volumes:
      - nats-semstreams-kitchen-data:/data
    networks:
      - semstreams-kitchen-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8222/healthz",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  # SemStreams Application (kitchen sink config with all features)
  # Core variant - runs without ML services (uses BM25 fallback for search)
  semstreams:
    build:
      context: .
      target: production
    container_name: semstreams-kitchen-app
    command: ["--config", "/app/configs/semantic-kitchen-sink.json"]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - SEMSTREAMS_NATS_URLS=nats://nats:4222
      - SEMSTREAMS_LOG_LEVEL=debug
      # Embedding disabled by default - BM25 fallback will be used
      - EMBEDDING_PROVIDER=none
    volumes:
      - ./configs:/app/configs:ro
      - ./testdata:/data/testdata:ro
    ports:
      - "8080:8080" # HTTP API (health, components)
      - "9090:9090" # Prometheus metrics
      - "14550:14550/udp" # UDP input
      - "8083:8082" # WebSocket output (host:8083 -> container:8082)
    networks:
      - semstreams-kitchen-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  # SemStreams Application with ML services enabled
  # PROFILE: ml - Only started when --profile ml is specified
  semstreams-ml:
    build:
      context: .
      target: production
    container_name: semstreams-kitchen-app-ml
    profiles:
      - ml
    entrypoint: ["sh", "-c"]
    command: ["sleep 30 && /app/semstreams --config /app/configs/semantic-kitchen-sink-ml.json"]
    depends_on:
      nats:
        condition: service_healthy
      semembed:
        condition: service_healthy
      seminstruct:
        condition: service_healthy
    environment:
      - SEMSTREAMS_NATS_URLS=nats://nats:4222
      - SEMSTREAMS_LOG_LEVEL=debug
    volumes:
      - ./configs:/app/configs:ro
      - ./testdata:/data/testdata:ro
    ports:
      - "8180:8080" # HTTP API (different port to avoid conflict with core)
      - "9190:9090" # Prometheus metrics
      - "14650:14550/udp" # UDP input
      - "8183:8082" # WebSocket output
    networks:
      - semstreams-kitchen-net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  semstreams-kitchen-net:
    driver: bridge

volumes:
  nats-semstreams-kitchen-data:
    driver: local
  semembed-kitchen-cache:
    driver: local
  shimmy-kitchen-cache:
    driver: local
